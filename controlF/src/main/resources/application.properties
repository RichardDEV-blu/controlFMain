spring.application.name=controlF

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/controlf}spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
server.port=8080
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration,org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration,org.springframework.boot.autoconfigure.security.servlet.SecurityFilterAutoConfiguration


app.cors.allowed-origin=http://localhost:5173
app.jwt.secret=${JWT_SECRET:controlf-2026-jwt-signing-key-0123456789abcdef0123456789abcdef}
app.jwt.expiration-hours=24

app.gemini.api-key=${GEMINI_API_KEY:}
app.gemini.model=gemini-2.5-flash

